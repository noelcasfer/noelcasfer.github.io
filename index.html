<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noel Casfer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      max-width: 650px;
      margin: 20px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    p {
      line-height: 1.6;
      color: #555;
      font-size: 1.05rem;
    }

    .note {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #777;
    }

    a {
      color: #5f7a61;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Noel Casfer</h1>
    <p>
      Soy investigador y docente interesado en la relación entre territorio,
      cultura y medios digitales. Este espacio reunirá próximamente algunos de mis
      proyectos, trabajos e iniciativas.
    </p>
    <p class="note">
      Web en construcción.
    </p>
  </main>
</body>
</html>
